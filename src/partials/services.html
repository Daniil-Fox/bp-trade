<section class="services" id="services">
  <div class="container">
    <div class="services__header">
      <div class="services__text">
        <h2 class="services__title">спектр услуг</h2>
        <p class="services__text text-xl">
          Мы&nbsp;сопровождаем клиента на&nbsp;всех этапах: от&nbsp;подбора авто

        </p>
      </div>
      <div class="services__control control">

        </button>

        </button>

            </h3>
            <div class="services__card-img">
              <picture>
                <source srcset="./img/services/01.webp" type="image/webp" />
                <img
                  loading="lazy"
                  src="./img/services/01.png"
                  class="image"
                  width="390"
                  height="660"
