<section class="cta" id="cta">
  <div class="container container_noright">
    <div class="cta__container">
      <div class="cta__content">
        <div class="cta__text">
          <h2 class="cta__title">Подберём авто под ваш бюджет</h2>
          <p class="cta__desc text-xl">
            Заполните форму&nbsp;&mdash; подберём авто под ваш бюджет
            и&nbsp;отправим варианты уже в&nbsp;ближайшее время.
          </p>
        </div>
        <form class="cta__form form">
          <label class="form__field">
            <input type="text" name="Имя" class="form__input" />
            <span>Имя</span>
          </label>
          <label class="form__field">
            <input type="tel" name="Телефон" class="form__input" />
            <span>Телефон</span>
          </label>
          <label class="form__field">
            <input type="text" name="Бюджет" class="form__input" />
            <span>Бюджет</span>
          </label>
          <label class="form__field">
            <textarea
              type="text"
              name="Пожелания"
              class="form__input"
            ></textarea>
            <span>Пожелания</span>
          </label>
          <button class="form__btn btn">Получить подборку</button>
        </form>
      </div>

      <div class="cta__img">
        <picture>
          <source
            srcset="./img/cta-mob.webp"
            media="(max-width: 576px)"
            type="image/webp"
          />
          <source srcset="./img/cta.webp" type="image/webp" />
          <img
            loading="lazy"
            src="./img/cta.jpg"
            class="image"
            width="1200"
            height="700"
            alt=""
          />
        </picture>
      </div>
    </div>
  </div>
</section>
